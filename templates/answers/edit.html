{% extends 'base.html' %}
{% block title %}Edit Answer – StackIt{% endblock %}
{% block content %}
<main class="main-content" style="max-width:860px;">
  <div class="page-header"><h1>Edit Answer</h1></div>
  <div class="form-card">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <div class="editor-wrap">
          <div class="editor-toolbar">
            <button type="button" class="editor-btn" data-action="bold" data-target="answer-editor"><b>B</b></button>
            <button type="button" class="editor-btn" data-action="italic" data-target="answer-editor"><i>I</i></button>
            <div class="editor-sep"></div>
            <button type="button" class="editor-btn" data-action="code" data-target="answer-editor">`</button>
            <button type="button" class="editor-btn" data-action="code-block" data-target="answer-editor">{ }</button>
          </div>
          <textarea name="content" id="answer-editor" class="form-control" rows="12">{{ form.content.value }}</textarea>
          <div class="preview-toggle-bar">
            <button type="button" class="preview-tab-btn active" data-mode="write" data-target="answer-editor" data-preview="answer-preview">Write</button>
            <button type="button" class="preview-tab-btn" data-mode="preview" data-target="answer-editor" data-preview="answer-preview">Preview</button>
          </div>
          <div class="md-preview post-body" id="answer-preview"></div>
        </div>
        {% if form.content.errors %}<div class="form-error">{{ form.content.errors.0 }}</div>{% endif %}
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Answer</button>
        <a href="{{ answer.question.get_absolute_url }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</main>
<aside class="right-sidebar"></aside>
{% endblock %}
