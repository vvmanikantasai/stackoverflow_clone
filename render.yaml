databases:
  - name: stackit-db
    plan: free
    databaseName: stackit
    user: stackit

services:
  - type: web
    name: stackit-web
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn stackit.wsgi:application
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stackit-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
